<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap - SnapSell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter'] }, colors: { primary: '#7C3AED' } } } };
  </script>
  <style> body { background-color: #F9FAFB; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans" style="background-color: #F9FAFB;">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-lg p-8 border border-gray-100">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">SnapSell</h1>
        <p class="text-gray-500 text-sm mt-1">Hesabınıza giriş yapın</p>
      </div>
      <form id="loginForm" class="space-y-5" action="javascript:void(0)">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-posta</label>
          <input type="email" id="email" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#7C3AED] focus:border-transparent outline-none" placeholder="ornek@email.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
          <input type="password" id="password" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#7C3AED] focus:border-transparent outline-none" placeholder="••••••••">
        </div>
        <p id="loginError" class="text-sm text-red-500 hidden"></p>
        <button type="button" id="loginBtn" class="w-full py-3 rounded-lg font-semibold text-white shadow-md hover:shadow-lg transition" style="background-color: #7C3AED;">Giriş Yap</button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-600">Hesabın yok mu? <a href="/register" class="font-medium text-[#7C3AED] hover:underline">Kayıt ol</a></p>
    </div>
  </div>
  <script type="module">
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    const firebaseConfig = { apiKey: "AIzaSyDX3-UZN9pSTgMopELRd4dWq8_VA6Pi8Gw", authDomain: "snapsellapp-6649a.firebaseapp.com", projectId: "snapsellapp-6649a", storageBucket: "snapsellapp-6649a.firebasestorage.app", messagingSenderId: "503663017163", appId: "1:503663017163:web:8d02525549bd7f58f0af4e" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    function doLogin() {
      var errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) { errEl.textContent = 'E-posta ve şifre girin.'; errEl.classList.remove('hidden'); return; }
      signInWithEmailAndPassword(auth, email, password).then(async function(userCred) {
        var user = userCred.user;
        var token = await user.getIdToken();
        var api = window.location.origin;
        try {
          var r = await fetch(api + '/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: token })
          });
          var data = await r.json();
          if (data.ok && data.isAdmin) {
            window.location.replace(api + '/dashboard.html');
            return;
          }
        } catch (e) {}
        setTimeout(function() {
          window.location.replace(api + '/dashboard.html');
        }, 400);
      }).catch(function(err) {
        errEl.textContent = err.message || 'Giriş başarısız.';
        errEl.classList.remove('hidden');
      });
    }
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('loginForm').addEventListener('submit', function(e) { e.preventDefault(); doLogin(); });
  </script>
</body>
</html>
